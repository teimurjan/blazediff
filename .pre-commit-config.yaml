repos:
  - repo: local
    hooks:
      - id: jsr-patches-clean
        name: jsr patches not applied
        entry: scripts/checks/check-jsr-patches-clean.sh
        language: system
        pass_filenames: false
        always_run: true
      - id: biome
        name: biome check
        entry: pnpm exec biome check --write --no-errors-on-unmatched
        language: system
        types_or: [javascript, jsx, ts, tsx, json]
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path crates/Cargo.toml --all
        language: system
        types: [rust]
        pass_filenames: false
