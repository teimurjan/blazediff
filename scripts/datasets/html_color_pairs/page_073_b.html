<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge CI</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 h-screen w-screen overflow-hidden font-sans">
  <div class="flex flex-col h-full">
    <header class="h-14 bg-white border-b border-slate-200 flex items-center px-6 gap-3 shrink-0">
      <div class="h-7 w-7 rounded bg-orange-500"></div>
      <span class="font-bold text-slate-900">Forge CI</span>
      <span class="text-slate-400">/</span>
      <span class="text-slate-600 text-sm">acme/web-app</span>
      <div class="ml-auto text-sm text-slate-500">March 14, 2026</div>
    </header>
    <div class="px-6 border-b border-slate-200 bg-white shrink-0">
      <nav class="flex gap-6 text-sm">
        <a class="py-3 border-b-2 border-transparent text-slate-500">Overview</a>
        <a data-changed="true" data-region-id="region-1" class="py-3 border-b-2 border-indigo-500 text-indigo-600 font-medium">Pipelines</a>
        <a class="py-3 border-b-2 border-transparent text-slate-500">Artifacts</a>
        <a class="py-3 border-b-2 border-transparent text-slate-500">Insights</a>
        <a class="py-3 border-b-2 border-transparent text-slate-500">Settings</a>
      </nav>
    </div>
    <main class="flex-1 p-8 overflow-hidden">
      <h1 class="text-2xl font-bold text-slate-900">Pipelines</h1>
      <p class="text-slate-500 mt-1">Recent runs on the main branch.</p>
      <div class="mt-6 bg-white rounded-xl border border-slate-200 divide-y divide-slate-100 overflow-hidden">
        <div class="flex items-center gap-4 px-6 py-4">
          <span class="h-2.5 w-2.5 rounded-full bg-emerald-500"></span>
          <span class="font-medium text-slate-800">Build &amp; Test</span>
          <span class="text-sm text-slate-500">#2481 · feat: add cache layer</span>
          <span class="ml-auto text-sm text-slate-400">2m 14s</span>
        </div>
        <div class="flex items-center gap-4 px-6 py-4">
          <span class="h-2.5 w-2.5 rounded-full bg-amber-500"></span>
          <span class="font-medium text-slate-800">Deploy Staging</span>
          <span class="text-sm text-slate-500">#2480 · running</span>
          <span class="ml-auto text-sm text-slate-400">1m 03s</span>
        </div>
        <div class="flex items-center gap-4 px-6 py-4">
          <span class="h-2.5 w-2.5 rounded-full bg-rose-500"></span>
          <span class="font-medium text-slate-800">Lint</span>
          <span class="text-sm text-slate-500">#2479 · 4 errors</span>
          <span class="ml-auto text-sm text-slate-400">0m 38s</span>
        </div>
        <div class="flex items-center gap-4 px-6 py-4">
          <span class="h-2.5 w-2.5 rounded-full bg-emerald-500"></span>
          <span class="font-medium text-slate-800">Build &amp; Test</span>
          <span class="text-sm text-slate-500">#2478 · fix: race condition</span>
          <span class="ml-auto text-sm text-slate-400">2m 51s</span>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
