<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=800">
<title>Order Detail</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 w-[1280px] h-[800px] overflow-hidden font-sans">
<div class="max-w-4xl mx-auto pt-10 px-6">
<div class="flex items-center justify-between mb-6">
<div>
<h1 class="text-2xl font-bold text-gray-900">Order #ORD-20488</h1>
<p class="text-gray-500 text-sm">Placed March 14, 2026</p>
</div>
<span data-changed="true" data-region-id="region-1" class="px-4 py-1.5 rounded-full bg-green-100 text-green-700 font-medium text-sm">Delivered</span>
</div>
<div class="bg-white rounded-xl shadow-sm divide-y divide-gray-100">
<div class="flex items-center gap-4 p-5">
<div class="h-16 w-16 rounded-lg bg-orange-400"></div>
<div class="flex-1">
<div class="font-medium text-gray-900">Ceramic Pour-Over Set</div>
<div class="text-sm text-gray-500">Matte White · Qty 1</div>
</div>
<div class="font-semibold text-gray-900">$48.00</div>
</div>
<div class="flex items-center gap-4 p-5">
<div class="h-16 w-16 rounded-lg bg-rose-400"></div>
<div class="flex-1">
<div class="font-medium text-gray-900">Single-Origin Beans</div>
<div class="text-sm text-gray-500">Ethiopia Yirgacheffe · Qty 2</div>
</div>
<div class="font-semibold text-gray-900">$36.00</div>
</div>
</div>
<div class="bg-white rounded-xl shadow-sm mt-6 p-6">
<div class="flex justify-between text-gray-600 text-sm"><span>Subtotal</span><span>$84.00</span></div>
<div class="flex justify-between text-gray-600 text-sm mt-2"><span>Shipping</span><span>$6.00</span></div>
<div class="flex justify-between text-gray-900 font-bold text-lg mt-4 pt-4 border-t border-gray-100"><span>Total</span><span>$90.00</span></div>
</div>
<div class="flex gap-3 mt-6">
<button class="flex-1 py-3 rounded-lg bg-gray-900 text-white font-medium">Track Package</button>
<button class="flex-1 py-3 rounded-lg border border-gray-300 text-gray-700 font-medium">Buy Again</button>
</div>
</div>
</body>
</html>
