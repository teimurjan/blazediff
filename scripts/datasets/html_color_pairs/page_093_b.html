<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white h-screen w-screen overflow-hidden font-sans flex flex-col">
  <div data-changed="true" data-region-id="region-1" class="bg-gradient-to-r from-teal-600 to-cyan-600 text-white px-8 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="rounded-full bg-white/20 px-2 py-0.5 text-xs font-semibold uppercase tracking-wide">Trial</span>
      <p class="text-sm font-medium">Your trial ends March 14, 2026. Upgrade now to keep your data and integrations.</p>
    </div>
    <button class="rounded-md bg-white text-indigo-700 text-sm font-semibold px-4 py-1.5 hover:bg-indigo-50">Upgrade plan</button>
  </div>
  <div class="flex-1 px-8 py-8">
    <h1 class="text-2xl font-bold text-slate-900">Workspace settings</h1>
    <p class="text-slate-500 mt-1">Manage your organization preferences and billing.</p>
    <div class="mt-8 grid grid-cols-2 gap-6 max-w-4xl">
      <div class="rounded-xl border border-slate-200 p-6">
        <h2 class="font-semibold text-slate-800">General</h2>
        <p class="text-sm text-slate-500 mt-1">Workspace name, timezone, and locale.</p>
        <div class="mt-4 h-2 w-3/4 rounded bg-slate-100"></div>
        <div class="mt-3 h-2 w-1/2 rounded bg-slate-100"></div>
      </div>
      <div class="rounded-xl border border-slate-200 p-6">
        <h2 class="font-semibold text-slate-800">Members</h2>
        <p class="text-sm text-slate-500 mt-1">Invite teammates and manage roles.</p>
        <div class="mt-4 h-2 w-2/3 rounded bg-slate-100"></div>
        <div class="mt-3 h-2 w-1/3 rounded bg-slate-100"></div>
      </div>
    </div>
  </div>
</body>
</html>
