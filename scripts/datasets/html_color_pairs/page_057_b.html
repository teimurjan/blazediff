<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integrations</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans">
  <header class="h-14 bg-white border-b border-slate-200 flex items-center px-8">
    <span class="text-base font-bold text-slate-900">Settings</span>
    <span class="ml-6 text-sm text-slate-400">Integrations</span>
  </header>
  <main class="flex-1 flex items-center justify-center px-8">
    <div class="text-center max-w-xl">
      <div class="flex justify-center gap-4 mb-7">
        <div data-changed="true" data-region-id="region-1" class="w-16 h-16 rounded-2xl bg-orange-500 shadow-md"></div>
        <div class="w-16 h-16 rounded-2xl bg-slate-300 shadow-md"></div>
        <div class="w-16 h-16 rounded-2xl bg-slate-300 shadow-md"></div>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">Connect your first integration</h1>
      <p class="text-sm text-slate-500 mt-2 max-w-md mx-auto">You haven't connected any apps yet. Link your tools to sync data automatically across your workspace.</p>
      <div class="mt-7 grid grid-cols-2 gap-4 text-left">
        <div class="p-4 rounded-xl border border-slate-200 bg-white flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-emerald-100"></div>
          <div>
            <p class="text-sm font-semibold text-slate-800">Slack</p>
            <p class="text-xs text-slate-400">Send alerts to channels</p>
          </div>
          <button type="button" data-changed="true" data-region-id="region-2" class="ml-auto text-xs font-semibold text-white bg-violet-600 px-3 py-1.5 rounded-lg">Connect</button>
        </div>
        <div class="p-4 rounded-xl border border-slate-200 bg-white flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-blue-100"></div>
          <div>
            <p class="text-sm font-semibold text-slate-800">GitHub</p>
            <p class="text-xs text-slate-400">Track pull requests</p>
          </div>
          <button type="button" class="ml-auto text-xs font-semibold text-white bg-slate-800 px-3 py-1.5 rounded-lg">Connect</button>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
