<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans">
  <header class="h-14 bg-white border-b border-slate-200 flex items-center px-6 gap-3">
    <div data-changed="true" data-region-id="region-1" class="w-7 h-7 rounded-lg bg-purple-600"></div>
    <span class="text-base font-bold text-slate-900">Q2 Roadmap</span>
    <button type="button" class="ml-auto text-sm font-semibold text-white bg-purple-600 px-4 py-1.5 rounded-lg">+ New task</button>
  </header>
  <main class="flex-1 p-6 grid grid-cols-3 gap-5">
    <div class="bg-white rounded-xl border border-slate-200 p-4 flex flex-col">
      <div class="flex items-center gap-2 mb-4">
        <span class="w-2.5 h-2.5 rounded-full bg-slate-400"></span>
        <span class="text-sm font-semibold text-slate-700">To do</span>
        <span class="text-xs text-slate-400">0</span>
      </div>
      <div class="flex-1 flex flex-col items-center justify-center text-center">
        <div class="w-14 h-14 rounded-2xl bg-slate-100 mb-3"></div>
        <p class="text-sm font-medium text-slate-600">No tasks yet</p>
        <p class="text-xs text-slate-400 mt-1">Add a task to start planning.</p>
        <button type="button" data-changed="true" data-region-id="region-2" class="mt-3 text-xs font-semibold text-purple-600 border border-purple-200 px-3 py-1.5 rounded-lg">+ Add task</button>
      </div>
    </div>
    <div class="bg-white rounded-xl border border-slate-200 p-4">
      <div class="flex items-center gap-2 mb-4">
        <span class="w-2.5 h-2.5 rounded-full bg-amber-400"></span>
        <span class="text-sm font-semibold text-slate-700">In progress</span>
        <span class="text-xs text-slate-400">0</span>
      </div>
      <div class="h-24 rounded-lg border-2 border-dashed border-slate-200"></div>
    </div>
    <div class="bg-white rounded-xl border border-slate-200 p-4">
      <div class="flex items-center gap-2 mb-4">
        <span class="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
        <span class="text-sm font-semibold text-slate-700">Done</span>
        <span class="text-xs text-slate-400">0</span>
      </div>
      <div class="h-24 rounded-lg border-2 border-dashed border-slate-200"></div>
    </div>
  </main>
</body>
</html>
