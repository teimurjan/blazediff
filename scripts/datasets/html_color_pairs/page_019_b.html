<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Insights</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: { brand: '#7c3aed', accent: '#0ea5e9' } } } }
</script>
</head>
<body class="bg-gray-50 h-screen overflow-hidden">
<div class="h-full p-6 flex flex-col gap-5">
  <header class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900">Store Insights</h1>
    <span data-changed="true" data-region-id="region-1" class="text-xs font-semibold px-3 py-1.5 rounded-full bg-emerald-600 text-white">Pro plan</span>
  </header>
  <div class="grid grid-cols-3 gap-5">
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-gray-400">Gross Sales</p>
      <p class="text-3xl font-bold text-gray-900 mt-1">$124,880</p>
      <p class="text-sm text-emerald-600 mt-1">+9.4% MoM</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-gray-400">Orders</p>
      <p class="text-3xl font-bold text-gray-900 mt-1">3,902</p>
      <p class="text-sm text-emerald-600 mt-1">+5.1% MoM</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-gray-400">Refund Rate</p>
      <p class="text-3xl font-bold text-gray-900 mt-1">1.8%</p>
      <p class="text-sm text-rose-600 mt-1">+0.3 pts</p>
    </div>
  </div>
  <div class="grid grid-cols-3 gap-5 flex-1">
    <div class="bg-white rounded-xl p-6 shadow-sm col-span-2 flex flex-col">
      <h2 class="text-sm font-semibold text-gray-700 mb-4">Sales by week</h2>
      <div class="flex items-end gap-3 flex-1">
        <div class="flex-1 bg-accent rounded-t h-1/2"></div>
        <div class="flex-1 bg-accent rounded-t h-2/3"></div>
        <div class="flex-1 bg-accent rounded-t h-2/5"></div>
        <div class="flex-1 bg-accent rounded-t h-3/4"></div>
        <div class="flex-1 bg-accent rounded-t h-3/5"></div>
        <div class="flex-1 bg-accent rounded-t h-full"></div>
      </div>
    </div>
    <div class="bg-white rounded-xl p-6 shadow-sm flex flex-col">
      <h2 class="text-sm font-semibold text-gray-700 mb-4">Top categories</h2>
      <div class="space-y-3 flex-1">
        <div>
          <div class="flex justify-between text-xs text-gray-500 mb-1"><span>Apparel</span><span>$42K</span></div>
          <div class="h-2.5 bg-gray-100 rounded-full"><div class="h-2.5 bg-pink-500 rounded-full w-full"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-gray-500 mb-1"><span>Footwear</span><span>$31K</span></div>
          <div class="h-2.5 bg-gray-100 rounded-full"><div data-changed="true" data-region-id="region-2" class="h-2.5 bg-cyan-500 rounded-full w-3/4"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-gray-500 mb-1"><span>Accessories</span><span>$22K</span></div>
          <div class="h-2.5 bg-gray-100 rounded-full"><div class="h-2.5 bg-pink-500 rounded-full w-1/2"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-gray-500 mb-1"><span>Home</span><span>$14K</span></div>
          <div class="h-2.5 bg-gray-100 rounded-full"><div class="h-2.5 bg-pink-500 rounded-full w-1/3"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
