<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topics</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 h-screen w-screen overflow-hidden font-sans flex items-center justify-center">
  <div class="w-full max-w-3xl px-8">
    <h1 class="text-2xl font-bold text-white mb-1">Browse by topic</h1>
    <p class="text-sm text-slate-400 mb-8">Pick the subjects you want in your feed</p>
    <div class="flex flex-wrap gap-3">
      <span class="text-sm font-medium px-4 py-2 rounded-full bg-indigo-500 text-white">Machine Learning</span>
      <span class="text-sm font-medium px-4 py-2 rounded-full bg-slate-800 text-slate-300">Web Dev</span>
      <span data-changed="true" data-region-id="region-1" class="text-sm font-medium px-4 py-2 rounded-full bg-emerald-500 text-white">DevOps</span>
      <span class="text-sm font-medium px-4 py-2 rounded-full bg-slate-800 text-slate-300">Security</span>
      <span class="text-sm font-medium px-4 py-2 rounded-full bg-slate-800 text-slate-300">Databases</span>
      <span class="text-sm font-medium px-4 py-2 rounded-full bg-pink-500 text-white">Design</span>
      <span class="text-sm font-medium px-4 py-2 rounded-full bg-slate-800 text-slate-300">Mobile</span>
      <span class="text-sm font-medium px-4 py-2 rounded-full bg-slate-800 text-slate-300">Cloud</span>
      <span class="text-sm font-medium px-4 py-2 rounded-full bg-amber-500 text-white">Startups</span>
      <span class="text-sm font-medium px-4 py-2 rounded-full bg-slate-800 text-slate-300">Hardware</span>
      <span class="text-sm font-medium px-4 py-2 rounded-full bg-slate-800 text-slate-300">Open Source</span>
      <span class="text-sm font-medium px-4 py-2 rounded-full bg-sky-500 text-white">Data Science</span>
    </div>
    <button class="mt-10 px-6 py-2.5 rounded-lg bg-white text-slate-900 font-semibold text-sm">Save preferences</button>
  </div>
</body>
</html>
