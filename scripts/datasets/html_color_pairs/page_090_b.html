<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen w-screen overflow-hidden font-sans">
  <div class="h-full w-full p-8 flex flex-col">
    <h1 class="text-2xl font-bold text-slate-900 mb-6">Product Roadmap — 2026</h1>
    <div class="grid grid-cols-4 gap-5 flex-1 min-h-0">
      <div class="bg-white rounded-xl border border-slate-200 p-4 flex flex-col">
        <h2 class="text-sm font-semibold text-slate-700 mb-4">Now</h2>
        <div class="space-y-3 overflow-hidden">
          <div class="rounded-lg border border-slate-100 p-3">
            <p class="text-sm font-medium text-slate-800">SSO for Enterprise</p>
            <span data-changed="true" data-region-id="region-1" class="inline-block mt-2 text-xs font-semibold px-2 py-0.5 rounded-full bg-cyan-100 text-cyan-700">On track</span>
          </div>
          <div class="rounded-lg border border-slate-100 p-3">
            <p class="text-sm font-medium text-slate-800">Audit log export</p>
            <span class="inline-block mt-2 text-xs font-semibold px-2 py-0.5 rounded-full bg-amber-100 text-amber-700">At risk</span>
          </div>
        </div>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4 flex flex-col">
        <h2 class="text-sm font-semibold text-slate-700 mb-4">Next</h2>
        <div class="space-y-3 overflow-hidden">
          <div class="rounded-lg border border-slate-100 p-3">
            <p class="text-sm font-medium text-slate-800">Mobile offline mode</p>
            <span class="inline-block mt-2 text-xs font-semibold px-2 py-0.5 rounded-full bg-sky-100 text-sky-700">Planned</span>
          </div>
          <div class="rounded-lg border border-slate-100 p-3">
            <p class="text-sm font-medium text-slate-800">Granular permissions</p>
            <span data-changed="true" data-region-id="region-2" class="inline-block mt-2 text-xs font-semibold px-2 py-0.5 rounded-full bg-purple-100 text-purple-700">Planned</span>
          </div>
        </div>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4 flex flex-col">
        <h2 class="text-sm font-semibold text-slate-700 mb-4">Later</h2>
        <div class="space-y-3 overflow-hidden">
          <div class="rounded-lg border border-slate-100 p-3">
            <p class="text-sm font-medium text-slate-800">AI summaries</p>
            <span class="inline-block mt-2 text-xs font-semibold px-2 py-0.5 rounded-full bg-violet-100 text-violet-700">Exploring</span>
          </div>
          <div class="rounded-lg border border-slate-100 p-3">
            <p class="text-sm font-medium text-slate-800">Public API v3</p>
            <span class="inline-block mt-2 text-xs font-semibold px-2 py-0.5 rounded-full bg-violet-100 text-violet-700">Exploring</span>
          </div>
        </div>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4 flex flex-col">
        <h2 class="text-sm font-semibold text-slate-700 mb-4">Shipped</h2>
        <div class="space-y-3 overflow-hidden">
          <div class="rounded-lg border border-slate-100 p-3">
            <p class="text-sm font-medium text-slate-800">Webhooks v2</p>
            <span class="inline-block mt-2 text-xs font-semibold px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">Done</span>
          </div>
          <div class="rounded-lg border border-slate-100 p-3">
            <p class="text-sm font-medium text-slate-800">Team analytics</p>
            <span data-changed="true" data-region-id="region-3" class="inline-block mt-2 text-xs font-semibold px-2 py-0.5 rounded-full bg-teal-100 text-teal-700">Done</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
