<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipping Address</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-rose-50 h-screen flex items-center justify-center font-sans">
  <div class="w-full max-w-lg bg-white rounded-2xl shadow-lg p-8">
    <div class="flex items-center gap-2 mb-6">
      <span data-changed="true" data-region-id="region-1" class="flex items-center justify-center w-8 h-8 rounded-full bg-rose-600 text-white text-sm font-bold">2</span>
      <h1 class="text-xl font-bold text-gray-900">Shipping address</h1>
    </div>
    <form class="grid grid-cols-2 gap-4">
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Street address</label>
        <input type="text" value="142 Maple Avenue" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
      </div>
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Apartment, suite (optional)</label>
        <input type="text" value="Unit 5B" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
        <input type="text" value="Portland" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">State</label>
        <input type="text" value="Oregon" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">ZIP code</label>
        <input type="text" value="97204" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Country</label>
        <input type="text" value="United States" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
      </div>
      <button type="button" class="col-span-2 mt-2 bg-rose-600 text-white font-semibold py-2.5 rounded-lg hover:bg-rose-700">Continue to payment</button>
    </form>
  </div>
</body>
</html>
