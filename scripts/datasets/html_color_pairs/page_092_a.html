<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-800 h-screen w-screen overflow-hidden relative font-sans">
  <div class="absolute inset-0 p-10">
    <h1 class="text-xl font-semibold text-slate-200">Deployment pipeline</h1>
    <div class="mt-6 grid grid-cols-4 gap-4">
      <div class="h-28 rounded-xl bg-slate-700/60"></div>
      <div class="h-28 rounded-xl bg-slate-700/60"></div>
      <div class="h-28 rounded-xl bg-slate-700/60"></div>
      <div class="h-28 rounded-xl bg-slate-700/60"></div>
    </div>
    <div class="mt-4 h-40 rounded-xl bg-slate-700/40"></div>
  </div>
  <div class="absolute bottom-6 right-6 w-80 space-y-3">
    <div class="rounded-lg bg-white shadow-lg ring-1 ring-black/5 p-4 flex gap-3">
      <div class="h-8 w-8 flex-none rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold">&check;</div>
      <div>
        <p class="text-sm font-semibold text-slate-800">Build succeeded</p>
        <p class="text-xs text-slate-500 mt-0.5">api-gateway deployed to production in 1m 42s.</p>
      </div>
    </div>
    <div data-changed="true" data-region-id="region-1" class="rounded-lg bg-amber-500 shadow-lg p-4 flex gap-3">
      <div class="h-8 w-8 flex-none rounded-full bg-amber-400 text-white flex items-center justify-center font-bold">!</div>
      <div>
        <p class="text-sm font-semibold text-white">High latency detected</p>
        <p class="text-xs text-amber-100 mt-0.5">p99 response time exceeded 800ms on web-frontend.</p>
      </div>
    </div>
    <div class="rounded-lg bg-white shadow-lg ring-1 ring-black/5 p-4 flex gap-3">
      <div class="h-8 w-8 flex-none rounded-full bg-sky-100 text-sky-600 flex items-center justify-center font-bold">i</div>
      <div>
        <p class="text-sm font-semibold text-slate-800">New commit pushed</p>
        <p class="text-xs text-slate-500 mt-0.5">j.rivera pushed 3 commits to the main branch.</p>
      </div>
    </div>
  </div>
</body>
</html>
