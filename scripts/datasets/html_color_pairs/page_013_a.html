<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Performance</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-100 h-screen overflow-hidden">
<div class="h-full p-6 flex flex-col gap-5">
  <div data-changed="true" data-region-id="region-1" class="rounded-2xl p-6 bg-gradient-to-r from-purple-600 to-fuchsia-500 text-white flex items-center justify-between">
    <div>
      <p class="text-sm text-purple-100">Quarter to date</p>
      <p class="text-4xl font-bold mt-1">$1.92M</p>
      <p class="text-sm text-purple-100 mt-1">72% of $2.65M target</p>
    </div>
    <div class="text-right">
      <p class="text-sm text-purple-100">Deals closed</p>
      <p class="text-3xl font-bold mt-1">318</p>
    </div>
  </div>
  <div class="grid grid-cols-4 gap-5">
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-zinc-400">Pipeline</p>
      <p class="text-2xl font-bold text-zinc-900 mt-1">$4.1M</p>
      <p class="text-xs text-emerald-600 mt-1">+12% QoQ</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-zinc-400">Win Rate</p>
      <p class="text-2xl font-bold text-zinc-900 mt-1">28.4%</p>
      <p class="text-xs text-emerald-600 mt-1">+2.1 pts</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-zinc-400">Avg Deal Size</p>
      <p class="text-2xl font-bold text-zinc-900 mt-1">$6,038</p>
      <p class="text-xs text-rose-600 mt-1">-3% QoQ</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-zinc-400">Sales Cycle</p>
      <p class="text-2xl font-bold text-zinc-900 mt-1">42 days</p>
      <p class="text-xs text-emerald-600 mt-1">-4 days</p>
    </div>
  </div>
  <div class="grid grid-cols-2 gap-5 flex-1">
    <div class="bg-white rounded-xl p-6 shadow-sm flex flex-col">
      <h2 class="text-sm font-semibold text-zinc-700 mb-4">Quarterly bookings</h2>
      <div class="flex items-end gap-4 flex-1">
        <div class="flex-1 bg-teal-500 rounded-t h-2/5"></div>
        <div class="flex-1 bg-teal-500 rounded-t h-3/5"></div>
        <div class="flex-1 bg-teal-500 rounded-t h-1/2"></div>
        <div class="flex-1 bg-teal-500 rounded-t h-4/5"></div>
        <div class="flex-1 bg-teal-500 rounded-t h-full"></div>
      </div>
    </div>
    <div class="bg-white rounded-xl p-6 shadow-sm flex flex-col">
      <h2 class="text-sm font-semibold text-zinc-700 mb-4">Rep leaderboard</h2>
      <div class="space-y-4 flex-1">
        <div>
          <div class="flex justify-between text-xs text-zinc-500 mb-1"><span>A. Reyes</span><span>$412K</span></div>
          <div class="h-3 bg-zinc-100 rounded-full"><div class="h-3 bg-amber-500 rounded-full w-11/12"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-zinc-500 mb-1"><span>M. Tan</span><span>$388K</span></div>
          <div class="h-3 bg-zinc-100 rounded-full"><div class="h-3 bg-amber-500 rounded-full w-4/5"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-zinc-500 mb-1"><span>J. Okoro</span><span>$301K</span></div>
          <div class="h-3 bg-zinc-100 rounded-full"><div class="h-3 bg-amber-500 rounded-full w-3/5"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-zinc-500 mb-1"><span>S. Lee</span><span>$254K</span></div>
          <div class="h-3 bg-zinc-100 rounded-full"><div class="h-3 bg-amber-500 rounded-full w-1/2"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
