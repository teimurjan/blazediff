<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Telemetry</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 h-screen overflow-hidden text-slate-100">
<div class="h-full p-6 flex flex-col gap-5">
  <h1 class="text-2xl font-bold">Fleet Telemetry</h1>
  <div class="grid grid-cols-4 gap-5">
    <div data-changed="true" data-region-id="region-1" class="bg-slate-800 rounded-xl p-5 border-l-4 border-amber-400">
      <p class="text-xs text-slate-400">Active Devices</p>
      <p class="text-3xl font-bold mt-1">2,418</p>
      <p class="text-xs text-emerald-400 mt-1">98.2% online</p>
    </div>
    <div class="bg-slate-800 rounded-xl p-5 border-l-4 border-slate-600">
      <p class="text-xs text-slate-400">Alerts</p>
      <p class="text-3xl font-bold mt-1">17</p>
      <p class="text-xs text-rose-400 mt-1">3 critical</p>
    </div>
    <div class="bg-slate-800 rounded-xl p-5 border-l-4 border-slate-600">
      <p class="text-xs text-slate-400">Avg Latency</p>
      <p class="text-3xl font-bold mt-1">38ms</p>
      <p class="text-xs text-emerald-400 mt-1">-6ms</p>
    </div>
    <div class="bg-slate-800 rounded-xl p-5 border-l-4 border-slate-600">
      <p class="text-xs text-slate-400">Throughput</p>
      <p class="text-3xl font-bold mt-1">1.2 GB/s</p>
      <p class="text-xs text-slate-400 mt-1">peak 1.8</p>
    </div>
  </div>
  <div class="grid grid-cols-2 gap-5 flex-1">
    <div class="bg-slate-800 rounded-xl p-6 flex flex-col">
      <h2 class="text-sm font-semibold text-slate-300 mb-4">Requests per minute</h2>
      <div class="flex items-end gap-2 flex-1">
        <div class="flex-1 bg-cyan-500 rounded-t h-2/5"></div>
        <div class="flex-1 bg-cyan-500 rounded-t h-3/5"></div>
        <div class="flex-1 bg-cyan-500 rounded-t h-1/2"></div>
        <div class="flex-1 bg-cyan-500 rounded-t h-4/5"></div>
        <div class="flex-1 bg-cyan-500 rounded-t h-2/3"></div>
        <div class="flex-1 bg-cyan-500 rounded-t h-full"></div>
        <div class="flex-1 bg-cyan-500 rounded-t h-3/4"></div>
        <div class="flex-1 bg-cyan-500 rounded-t h-1/2"></div>
      </div>
    </div>
    <div class="bg-slate-800 rounded-xl p-6 flex flex-col">
      <h2 class="text-sm font-semibold text-slate-300 mb-4">Resource utilization</h2>
      <div class="space-y-4 flex-1">
        <div>
          <div class="flex justify-between text-xs text-slate-400 mb-1"><span>CPU</span><span>62%</span></div>
          <div class="h-3 bg-slate-700 rounded-full"><div class="h-3 bg-emerald-500 rounded-full w-3/5"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-slate-400 mb-1"><span>Memory</span><span>74%</span></div>
          <div class="h-3 bg-slate-700 rounded-full"><div class="h-3 bg-amber-500 rounded-full w-3/4"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-slate-400 mb-1"><span>Disk</span><span>41%</span></div>
          <div class="h-3 bg-slate-700 rounded-full"><div class="h-3 bg-emerald-500 rounded-full w-2/5"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-slate-400 mb-1"><span>Network</span><span>88%</span></div>
          <div class="h-3 bg-slate-700 rounded-full"><div data-changed="true" data-region-id="region-2" class="h-3 bg-blue-500 rounded-full w-11/12"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
