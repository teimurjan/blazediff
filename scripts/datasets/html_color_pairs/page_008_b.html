<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usage &amp; billing</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen w-screen overflow-hidden flex items-center justify-center font-sans">
  <div class="w-full max-w-4xl px-8">
    <div class="rounded-2xl bg-white shadow-lg overflow-hidden">
      <div data-changed="true" data-region-id="region-1" class="bg-sky-600 px-8 py-6 flex items-center justify-between">
        <div>
          <p class="text-violet-200 text-sm">Current plan</p>
          <h1 class="text-2xl font-bold text-white">Business · $80/mo</h1>
        </div>
        <button class="rounded-lg bg-white/15 text-white text-sm font-medium px-4 py-2 hover:bg-white/25">Manage plan</button>
      </div>
      <div class="px-8 py-7">
        <div class="grid grid-cols-3 gap-6">
          <div>
            <p class="text-sm text-slate-500">Seats used</p>
            <p class="mt-1 text-2xl font-bold text-slate-900">38 <span class="text-base font-normal text-slate-400">/ 50</span></p>
            <div class="mt-2 h-2 rounded-full bg-slate-200"><div class="h-2 w-3/4 rounded-full bg-violet-500"></div></div>
          </div>
          <div>
            <p class="text-sm text-slate-500">Storage</p>
            <p class="mt-1 text-2xl font-bold text-slate-900">412 <span class="text-base font-normal text-slate-400">/ 500 GB</span></p>
            <div class="mt-2 h-2 rounded-full bg-slate-200"><div class="h-2 w-5/6 rounded-full bg-violet-500"></div></div>
          </div>
          <div>
            <p class="text-sm text-slate-500">API calls</p>
            <p class="mt-1 text-2xl font-bold text-slate-900">1.2M <span class="text-base font-normal text-slate-400">/ 2M</span></p>
            <div class="mt-2 h-2 rounded-full bg-slate-200"><div class="h-2 w-3/5 rounded-full bg-violet-500"></div></div>
          </div>
        </div>
        <div class="mt-7 flex items-center justify-between border-t border-slate-100 pt-5">
          <p class="text-sm text-slate-500">Next invoice on <span class="font-medium text-slate-700">April 1, 2026</span></p>
          <span data-changed="true" data-region-id="region-2" class="bg-amber-100 text-amber-700 text-sm font-semibold px-3 py-1.5 rounded-lg">Payment on file</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
