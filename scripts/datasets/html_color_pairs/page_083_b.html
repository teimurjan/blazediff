<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Tags</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 h-screen w-screen overflow-hidden font-sans flex items-center justify-center">
  <div class="w-full max-w-3xl px-8">
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
      <div class="flex items-center gap-4 mb-6">
        <div class="h-14 w-14 rounded-full bg-indigo-500 flex items-center justify-center text-white text-xl font-bold">EM</div>
        <div>
          <h1 class="text-xl font-bold text-slate-900">Elena Marquez</h1>
          <p class="text-sm text-slate-500">VP of Engineering · Northwind Labs</p>
        </div>
      </div>
      <div class="mb-6">
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-400 mb-2">Labels</p>
        <div class="flex flex-wrap gap-2">
          <span class="text-xs font-medium px-3 py-1 rounded-full bg-emerald-100 text-emerald-700">Customer</span>
          <span data-changed="true" data-region-id="region-1" class="text-xs font-medium px-3 py-1 rounded-full bg-teal-100 text-teal-700">Enterprise</span>
          <span class="text-xs font-medium px-3 py-1 rounded-full bg-sky-100 text-sky-700">Decision Maker</span>
          <span class="text-xs font-medium px-3 py-1 rounded-full bg-amber-100 text-amber-700">Renewal Q2</span>
          <span class="text-xs font-medium px-3 py-1 rounded-full bg-rose-100 text-rose-700">High Value</span>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-4 border-t border-slate-100 pt-6">
        <div>
          <p class="text-xs text-slate-400">Deals</p>
          <p class="text-lg font-bold text-slate-900 mt-1">$248k</p>
        </div>
        <div>
          <p class="text-xs text-slate-400">Last contact</p>
          <p class="text-lg font-bold text-slate-900 mt-1">Mar 12</p>
        </div>
        <div>
          <p class="text-xs text-slate-400">Health</p>
          <p class="text-lg font-bold text-emerald-600 mt-1">Good</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
