<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Settings</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-100 h-screen flex items-center justify-center font-sans">
  <div class="w-full max-w-3xl bg-white rounded-2xl shadow-lg p-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-xl font-bold text-neutral-900">Security</h1>
      <span data-changed="true" data-region-id="region-1" class="text-xs font-semibold px-3 py-1 rounded-full bg-indigo-100 text-indigo-700">Protected</span>
    </div>
    <div class="space-y-5">
      <div class="border border-neutral-200 rounded-xl p-5">
        <h2 class="text-sm font-semibold text-neutral-800 mb-3">Change password</h2>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-medium text-neutral-600 mb-1">Current password</label>
            <input type="password" value="........" class="w-full px-3 py-2 border border-neutral-300 rounded-lg text-sm">
          </div>
          <div>
            <label class="block text-xs font-medium text-neutral-600 mb-1">New password</label>
            <input type="password" value="............" class="w-full px-3 py-2 border border-neutral-300 rounded-lg text-sm">
          </div>
        </div>
        <button type="button" data-changed="true" data-region-id="region-2" class="mt-4 bg-rose-600 text-white text-sm font-semibold px-5 py-2 rounded-lg">Update password</button>
      </div>
      <div class="border border-neutral-200 rounded-xl p-5 flex items-center justify-between">
        <div>
          <h2 class="text-sm font-semibold text-neutral-800">Two-factor authentication</h2>
          <p class="text-xs text-neutral-500 mt-1">Add an extra layer of security at sign-in.</p>
        </div>
        <button type="button" data-changed="true" data-region-id="region-3" class="bg-amber-500 text-white text-sm font-semibold px-5 py-2 rounded-lg">Enabled</button>
      </div>
      <div class="border border-neutral-200 rounded-xl p-5 flex items-center justify-between">
        <div>
          <h2 class="text-sm font-semibold text-neutral-800">Active sessions</h2>
          <p class="text-xs text-neutral-500 mt-1">3 devices signed in. Last active 2 hours ago.</p>
        </div>
        <button type="button" class="bg-white border border-neutral-300 text-neutral-700 text-sm font-medium px-5 py-2 rounded-lg">Sign out all</button>
      </div>
    </div>
  </div>
</body>
</html>
