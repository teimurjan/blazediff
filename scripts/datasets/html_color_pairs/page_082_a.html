<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deployments</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 h-screen w-screen overflow-hidden font-sans flex items-center justify-center">
  <div class="w-full max-w-4xl px-8">
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-slate-900">Deployments</h1>
      <p class="text-sm text-slate-500 mt-1">Recent releases across all environments</p>
    </div>
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
          <tr>
            <th class="text-left font-semibold px-6 py-3">Service</th>
            <th class="text-left font-semibold px-6 py-3">Environment</th>
            <th class="text-left font-semibold px-6 py-3">Version</th>
            <th class="text-left font-semibold px-6 py-3">Status</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          <tr>
            <td class="px-6 py-4 font-medium text-slate-800">api-gateway</td>
            <td class="px-6 py-4 text-slate-500">production</td>
            <td class="px-6 py-4 text-slate-500">v2.14.0</td>
            <td class="px-6 py-4"><span class="inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700">Live</span></td>
          </tr>
          <tr>
            <td class="px-6 py-4 font-medium text-slate-800">auth-service</td>
            <td class="px-6 py-4 text-slate-500">staging</td>
            <td class="px-6 py-4 text-slate-500">v1.9.3</td>
            <td class="px-6 py-4"><span data-changed="true" data-region-id="region-1" class="inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full bg-amber-100 text-amber-700">Deploying</span></td>
          </tr>
          <tr>
            <td class="px-6 py-4 font-medium text-slate-800">worker-queue</td>
            <td class="px-6 py-4 text-slate-500">production</td>
            <td class="px-6 py-4 text-slate-500">v3.2.1</td>
            <td class="px-6 py-4"><span class="inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700">Live</span></td>
          </tr>
          <tr>
            <td class="px-6 py-4 font-medium text-slate-800">billing-svc</td>
            <td class="px-6 py-4 text-slate-500">production</td>
            <td class="px-6 py-4 text-slate-500">v0.8.0</td>
            <td class="px-6 py-4"><span class="inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full bg-rose-100 text-rose-700">Failed</span></td>
          </tr>
          <tr>
            <td class="px-6 py-4 font-medium text-slate-800">notification</td>
            <td class="px-6 py-4 text-slate-500">staging</td>
            <td class="px-6 py-4 text-slate-500">v1.4.2</td>
            <td class="px-6 py-4"><span class="inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full bg-slate-100 text-slate-600">Paused</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
