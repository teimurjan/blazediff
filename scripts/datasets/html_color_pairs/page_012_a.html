<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traffic Analytics</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen overflow-hidden">
<div class="h-full flex">
  <aside class="w-56 bg-slate-900 text-slate-300 p-6 flex flex-col">
    <div class="text-white font-bold text-lg mb-8">Pulse</div>
    <nav class="space-y-1 text-sm">
      <div class="px-3 py-2 rounded-lg bg-slate-800 text-white">Overview</div>
      <div class="px-3 py-2 rounded-lg hover:bg-slate-800">Audience</div>
      <div class="px-3 py-2 rounded-lg hover:bg-slate-800">Acquisition</div>
      <div class="px-3 py-2 rounded-lg hover:bg-slate-800">Behavior</div>
      <div class="px-3 py-2 rounded-lg hover:bg-slate-800">Conversions</div>
    </nav>
    <div class="mt-auto text-xs text-slate-500">v3.2.1 · 2026</div>
  </aside>
  <main class="flex-1 p-8 overflow-hidden">
    <h1 class="text-2xl font-bold text-slate-900 mb-1">Traffic Analytics</h1>
    <p class="text-sm text-slate-500 mb-6">Last 30 days · March 14, 2026</p>
    <div class="grid grid-cols-3 gap-5 mb-6">
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <p class="text-xs text-slate-400">Sessions</p>
        <p class="text-2xl font-bold text-slate-900 mt-1">94,210</p>
        <div class="flex items-end gap-1 h-10 mt-3">
          <div class="flex-1 bg-sky-400 rounded-sm h-1/2"></div>
          <div class="flex-1 bg-sky-400 rounded-sm h-2/3"></div>
          <div class="flex-1 bg-sky-400 rounded-sm h-1/3"></div>
          <div class="flex-1 bg-sky-400 rounded-sm h-3/4"></div>
          <div class="flex-1 bg-sky-400 rounded-sm h-full"></div>
          <div class="flex-1 bg-sky-400 rounded-sm h-2/3"></div>
        </div>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <p class="text-xs text-slate-400">Bounce Rate</p>
        <p class="text-2xl font-bold text-slate-900 mt-1">41.3%</p>
        <div class="flex items-end gap-1 h-10 mt-3">
          <div class="flex-1 bg-amber-400 rounded-sm h-full"></div>
          <div class="flex-1 bg-amber-400 rounded-sm h-3/4"></div>
          <div class="flex-1 bg-amber-400 rounded-sm h-2/3"></div>
          <div class="flex-1 bg-amber-400 rounded-sm h-1/2"></div>
          <div class="flex-1 bg-amber-400 rounded-sm h-2/5"></div>
          <div class="flex-1 bg-amber-400 rounded-sm h-1/3"></div>
        </div>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <p class="text-xs text-slate-400">Avg Duration</p>
        <p class="text-2xl font-bold text-slate-900 mt-1">3m 12s</p>
        <div class="flex items-end gap-1 h-10 mt-3">
          <div class="flex-1 bg-violet-400 rounded-sm h-1/3"></div>
          <div class="flex-1 bg-violet-400 rounded-sm h-1/2"></div>
          <div class="flex-1 bg-violet-400 rounded-sm h-2/3"></div>
          <div class="flex-1 bg-violet-400 rounded-sm h-3/5"></div>
          <div class="flex-1 bg-violet-400 rounded-sm h-4/5"></div>
          <div class="flex-1 bg-violet-400 rounded-sm h-full"></div>
        </div>
      </div>
    </div>
    <div class="bg-white rounded-xl p-6 shadow-sm">
      <h2 class="text-sm font-semibold text-slate-700 mb-4">Sessions by channel</h2>
      <div class="flex items-end gap-4 h-48">
        <div class="flex-1 flex flex-col items-center justify-end h-full">
          <div class="w-full bg-indigo-500 rounded-t h-3/4"></div>
          <span class="text-xs text-slate-400 mt-2">Organic</span>
        </div>
        <div class="flex-1 flex flex-col items-center justify-end h-full">
          <div class="w-full bg-indigo-500 rounded-t h-1/2"></div>
          <span class="text-xs text-slate-400 mt-2">Direct</span>
        </div>
        <div class="flex-1 flex flex-col items-center justify-end h-full">
          <div class="w-full bg-indigo-500 rounded-t h-2/5"></div>
          <span class="text-xs text-slate-400 mt-2">Referral</span>
        </div>
        <div class="flex-1 flex flex-col items-center justify-end h-full">
          <div data-changed="true" data-region-id="region-1" class="w-full bg-indigo-500 rounded-t h-full"></div>
          <span class="text-xs text-slate-400 mt-2">Paid</span>
        </div>
        <div class="flex-1 flex flex-col items-center justify-end h-full">
          <div class="w-full bg-indigo-500 rounded-t h-1/4"></div>
          <span class="text-xs text-slate-400 mt-2">Social</span>
        </div>
        <div class="flex-1 flex flex-col items-center justify-end h-full">
          <div class="w-full bg-indigo-500 rounded-t h-1/3"></div>
          <span class="text-xs text-slate-400 mt-2">Email</span>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
