<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=800">
<title>Cookie consent</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="w-[1280px] h-[800px] overflow-hidden">
<div class="relative w-[1280px] h-[800px] bg-emerald-50">
<div class="absolute inset-0 px-16 py-10">
<div class="text-2xl font-extrabold text-emerald-900">Freshly &mdash; Organic Grocery Delivery</div>
<div class="mt-8 grid grid-cols-4 gap-6">
<div class="h-44 rounded-2xl bg-white shadow border border-emerald-100"></div>
<div class="h-44 rounded-2xl bg-white shadow border border-emerald-100"></div>
<div class="h-44 rounded-2xl bg-white shadow border border-emerald-100"></div>
<div class="h-44 rounded-2xl bg-white shadow border border-emerald-100"></div>
</div>
</div>
<div class="absolute inset-0 bg-slate-900/50 flex items-end justify-center pb-10">
<div class="w-[820px] rounded-2xl bg-white shadow-2xl p-7">
<div class="flex items-start gap-5">
<div class="flex-1">
<h2 class="text-lg font-bold text-slate-900">We value your privacy</h2>
<p class="mt-2 text-sm leading-relaxed text-slate-500">We use cookies to personalize content, analyze traffic, and improve your shopping experience. You can accept all cookies or manage your preferences. Read our cookie policy for details.</p>
</div>
<div class="flex flex-col gap-3 w-56 shrink-0">
<button data-changed="true" data-region-id="region-1" class="px-4 py-2.5 rounded-lg text-sm font-semibold text-white bg-emerald-600">Accept all</button>
<button class="px-4 py-2.5 rounded-lg text-sm font-medium text-slate-700 bg-slate-100">Reject non-essential</button>
<button class="px-4 py-2.5 rounded-lg text-sm font-medium text-slate-500 bg-white border border-slate-300">Manage preferences</button>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
