<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Summary</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 h-screen overflow-hidden">
<div class="h-full p-6 flex flex-col gap-5">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-zinc-900">Executive Summary</h1>
    <span class="text-sm text-zinc-500">Q1 2026 · March 14, 2026</span>
  </div>
  <div class="grid grid-cols-4 gap-5">
    <div data-changed="true" data-region-id="region-1" class="rounded-xl p-5 shadow-sm bg-indigo-600 text-white">
      <p class="text-xs text-emerald-100">Net Revenue</p>
      <p class="text-3xl font-bold mt-1">$5.4M</p>
      <p class="text-sm text-emerald-100 mt-1">+11% YoY</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-zinc-400">Gross Margin</p>
      <p class="text-3xl font-bold text-zinc-900 mt-1">68%</p>
      <p class="text-sm text-emerald-600 mt-1">+2 pts</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-zinc-400">Burn Rate</p>
      <p class="text-3xl font-bold text-zinc-900 mt-1">$310K/mo</p>
      <p class="text-sm text-rose-600 mt-1">+4% QoQ</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-zinc-400">Runway</p>
      <p class="text-3xl font-bold text-zinc-900 mt-1">19 mo</p>
      <p class="text-sm text-zinc-400 mt-1">at current burn</p>
    </div>
  </div>
  <div class="grid grid-cols-3 gap-5 flex-1">
    <div class="bg-white rounded-xl p-6 shadow-sm col-span-2 flex flex-col">
      <h2 class="text-sm font-semibold text-zinc-700 mb-4">Revenue vs target by month</h2>
      <div class="flex items-end gap-3 flex-1">
        <div class="flex-1 bg-indigo-500 rounded-t h-1/2"></div>
        <div class="flex-1 bg-indigo-500 rounded-t h-3/5"></div>
        <div data-changed="true" data-region-id="region-2" class="flex-1 bg-rose-500 rounded-t h-2/5"></div>
        <div class="flex-1 bg-indigo-500 rounded-t h-3/4"></div>
        <div class="flex-1 bg-indigo-500 rounded-t h-4/5"></div>
        <div class="flex-1 bg-indigo-500 rounded-t h-2/3"></div>
        <div class="flex-1 bg-indigo-500 rounded-t h-full"></div>
      </div>
    </div>
    <div class="bg-white rounded-xl p-6 shadow-sm flex flex-col">
      <h2 class="text-sm font-semibold text-zinc-700 mb-4">Department spend</h2>
      <div class="space-y-3 flex-1">
        <div>
          <div class="flex justify-between text-xs text-zinc-500 mb-1"><span>Engineering</span><span>44%</span></div>
          <div class="h-2.5 bg-zinc-100 rounded-full"><div class="h-2.5 bg-amber-500 rounded-full w-2/5"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-zinc-500 mb-1"><span>Sales</span><span>28%</span></div>
          <div class="h-2.5 bg-zinc-100 rounded-full"><div class="h-2.5 bg-amber-500 rounded-full w-1/4"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-zinc-500 mb-1"><span>Marketing</span><span>18%</span></div>
          <div class="h-2.5 bg-zinc-100 rounded-full"><div class="h-2.5 bg-amber-500 rounded-full w-1/6"></div></div>
        </div>
      </div>
      <div class="mt-4 pt-4 border-t border-zinc-100">
        <p data-changed="true" data-region-id="region-3" class="text-sm font-semibold text-fuchsia-600">View full report →</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
