<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team pricing</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 h-screen w-screen overflow-hidden flex items-center justify-center font-sans">
  <div class="w-full max-w-6xl px-8">
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold text-slate-900">Pricing for teams</h1>
      <span data-changed="true" data-region-id="region-1" class="bg-emerald-100 text-emerald-700 text-sm font-semibold px-4 py-1.5 rounded-full">2 months free yearly</span>
    </div>
    <div class="grid grid-cols-3 gap-6">
      <div class="rounded-2xl bg-white border border-slate-200 p-7 shadow-sm">
        <h2 class="text-lg font-semibold text-slate-800">Solo</h2>
        <p class="mt-4 text-4xl font-bold text-slate-900">$12<span class="text-base text-slate-400">/mo</span></p>
        <ul class="mt-6 space-y-3 text-sm text-slate-600">
          <li class="flex items-center"><span class="text-indigo-500 mr-2">✓</span>1 workspace</li>
          <li class="flex items-center"><span class="text-indigo-500 mr-2">✓</span>Basic integrations</li>
          <li class="flex items-center"><span class="text-indigo-500 mr-2">✓</span>7-day history</li>
        </ul>
        <button class="mt-7 w-full rounded-lg border border-slate-300 text-slate-700 py-2.5 font-medium hover:bg-slate-50">Start trial</button>
      </div>
      <div class="rounded-2xl bg-white border border-slate-200 p-7 shadow-sm">
        <h2 class="text-lg font-semibold text-slate-800">Team</h2>
        <p class="mt-4 text-4xl font-bold text-slate-900">$32<span class="text-base text-slate-400">/mo</span></p>
        <ul class="mt-6 space-y-3 text-sm text-slate-600">
          <li class="flex items-center"><span class="text-indigo-500 mr-2">✓</span>5 workspaces</li>
          <li class="flex items-center"><span class="text-indigo-500 mr-2">✓</span>All integrations</li>
          <li class="flex items-center"><span class="text-indigo-500 mr-2">✓</span>Unlimited history</li>
        </ul>
        <button class="mt-7 w-full rounded-lg border border-slate-300 text-slate-700 py-2.5 font-medium hover:bg-slate-50">Start trial</button>
      </div>
      <div class="rounded-2xl bg-white border border-slate-200 p-7 shadow-sm">
        <h2 class="text-lg font-semibold text-slate-800">Org</h2>
        <p class="mt-4 text-4xl font-bold text-slate-900">$60<span class="text-base text-slate-400">/mo</span></p>
        <ul class="mt-6 space-y-3 text-sm text-slate-600">
          <li class="flex items-center"><span class="text-indigo-500 mr-2">✓</span>Unlimited workspaces</li>
          <li class="flex items-center"><span class="text-indigo-500 mr-2">✓</span>SSO &amp; provisioning</li>
          <li class="flex items-center"><span class="text-indigo-500 mr-2">✓</span>Audit logs</li>
        </ul>
        <button data-changed="true" data-region-id="region-2" class="mt-7 w-full rounded-lg bg-indigo-600 text-white py-2.5 font-medium hover:bg-indigo-700">Get Org</button>
      </div>
    </div>
  </div>
</body>
</html>
