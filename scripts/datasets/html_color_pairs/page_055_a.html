<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex font-sans">
  <div data-changed="true" data-region-id="region-1" class="w-1/2 bg-gradient-to-br from-indigo-600 to-purple-700 flex items-center justify-center p-12">
    <div class="text-center">
      <div class="mx-auto w-32 h-32 rounded-3xl bg-white/15 flex items-center justify-center mb-6">
        <div class="w-16 h-16 rounded-2xl bg-white/80"></div>
      </div>
      <h2 class="text-2xl font-bold text-white">Build dashboards in minutes</h2>
      <p class="text-sm text-indigo-100 mt-2 max-w-xs mx-auto">Connect your data, drag in widgets, and ship reports your whole team can read.</p>
    </div>
  </div>
  <div class="w-1/2 bg-white flex items-center justify-center p-12">
    <div class="max-w-sm w-full text-center">
      <h1 class="text-3xl font-bold text-slate-900">Welcome to Lumen</h1>
      <p class="text-sm text-slate-500 mt-3 leading-relaxed">Let's get your workspace ready. It only takes about two minutes to set everything up.</p>
      <button type="button" class="mt-7 w-full bg-indigo-600 text-white text-sm font-semibold py-3 rounded-xl hover:bg-indigo-700">Get started</button>
      <button type="button" class="mt-3 w-full border border-slate-300 text-slate-700 text-sm font-semibold py-3 rounded-xl">Take a tour first</button>
      <p class="mt-6 text-xs text-slate-400">By continuing you agree to our Terms and Privacy Policy.</p>
    </div>
  </div>
</body>
</html>
