<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Operations</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen overflow-hidden">
<div class="h-full p-6 flex flex-col gap-5">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-slate-900">Support Operations</h1>
    <div class="flex items-center gap-2">
      <div data-changed="true" data-region-id="region-1" class="w-3 h-3 rounded-full bg-emerald-500 ring-4 ring-emerald-200"></div>
      <span class="text-sm text-slate-600">All systems operational</span>
    </div>
  </div>
  <div class="grid grid-cols-4 gap-5">
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-slate-400">Open Tickets</p>
      <p class="text-3xl font-bold text-slate-900 mt-1">147</p>
      <p class="text-xs text-rose-600 mt-1">+12 today</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-slate-400">Avg First Reply</p>
      <p class="text-3xl font-bold text-slate-900 mt-1">1h 04m</p>
      <p class="text-xs text-emerald-600 mt-1">-18m</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-slate-400">CSAT</p>
      <p class="text-3xl font-bold text-slate-900 mt-1">94.1%</p>
      <p class="text-xs text-emerald-600 mt-1">+1.2 pts</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-slate-400">Backlog</p>
      <p class="text-3xl font-bold text-slate-900 mt-1">38</p>
      <p class="text-xs text-amber-600 mt-1">SLA at risk</p>
    </div>
  </div>
  <div class="bg-white rounded-xl p-6 shadow-sm flex-1 flex flex-col">
    <h2 class="text-sm font-semibold text-slate-700 mb-4">Tickets by day (created vs resolved)</h2>
    <div class="flex items-end gap-4 flex-1">
      <div class="flex-1 flex flex-col justify-end gap-0.5 h-full">
        <div class="bg-sky-500 rounded-t h-2/5"></div>
        <div class="bg-indigo-700 rounded-b h-1/4"></div>
      </div>
      <div class="flex-1 flex flex-col justify-end gap-0.5 h-full">
        <div class="bg-sky-500 rounded-t h-1/2"></div>
        <div class="bg-indigo-700 rounded-b h-1/3"></div>
      </div>
      <div class="flex-1 flex flex-col justify-end gap-0.5 h-full">
        <div class="bg-sky-500 rounded-t h-3/5"></div>
        <div class="bg-indigo-700 rounded-b h-1/4"></div>
      </div>
      <div class="flex-1 flex flex-col justify-end gap-0.5 h-full">
        <div class="bg-sky-500 rounded-t h-2/3"></div>
        <div class="bg-indigo-700 rounded-b h-2/5"></div>
      </div>
      <div class="flex-1 flex flex-col justify-end gap-0.5 h-full">
        <div class="bg-sky-500 rounded-t h-3/4"></div>
        <div class="bg-indigo-700 rounded-b h-1/3"></div>
      </div>
      <div class="flex-1 flex flex-col justify-end gap-0.5 h-full">
        <div class="bg-sky-500 rounded-t h-full"></div>
        <div class="bg-indigo-700 rounded-b h-1/2"></div>
      </div>
      <div class="flex-1 flex flex-col justify-end gap-0.5 h-full">
        <div class="bg-sky-500 rounded-t h-4/5"></div>
        <div class="bg-indigo-700 rounded-b h-2/5"></div>
      </div>
    </div>
    <div class="flex gap-6 mt-4 text-xs text-slate-500">
      <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-sky-500"></span>Created</div>
      <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-indigo-700"></span>Resolved</div>
    </div>
  </div>
</div>
</body>
</html>
