<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Getting Started</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-sky-50 to-indigo-50 h-screen flex items-center justify-center font-sans">
  <div class="w-full max-w-lg bg-white rounded-2xl shadow-lg border border-slate-200 p-7">
    <h1 class="text-xl font-bold text-slate-900">Getting started</h1>
    <p class="text-sm text-slate-500 mt-1">Complete these steps to finish setting up your account.</p>
    <div class="mt-4 flex items-center gap-3">
      <div class="flex-1 h-2 rounded-full bg-slate-200 overflow-hidden">
        <div data-changed="true" data-region-id="region-1" class="h-full w-2/4 bg-fuchsia-500"></div>
      </div>
      <span class="text-xs font-semibold text-slate-600">2 of 4</span>
    </div>
    <ul class="mt-6 space-y-3">
      <li class="flex items-center gap-3 p-3 rounded-xl bg-teal-50 border border-teal-100">
        <span class="w-6 h-6 rounded-full bg-teal-500 flex items-center justify-center text-white text-xs">✓</span>
        <span class="text-sm font-medium text-slate-700 line-through">Verify your email address</span>
      </li>
      <li class="flex items-center gap-3 p-3 rounded-xl bg-teal-50 border border-teal-100">
        <span class="w-6 h-6 rounded-full bg-teal-500 flex items-center justify-center text-white text-xs">✓</span>
        <span class="text-sm font-medium text-slate-700 line-through">Create your first project</span>
      </li>
      <li class="flex items-center gap-3 p-3 rounded-xl border border-slate-200">
        <span class="w-6 h-6 rounded-full border-2 border-slate-300"></span>
        <span class="text-sm font-medium text-slate-700">Connect a data source</span>
        <span class="ml-auto text-xs font-semibold text-indigo-600">Start</span>
      </li>
      <li class="flex items-center gap-3 p-3 rounded-xl border border-slate-200">
        <span class="w-6 h-6 rounded-full border-2 border-slate-300"></span>
        <span class="text-sm font-medium text-slate-700">Invite a teammate</span>
        <span class="ml-auto text-xs font-semibold text-indigo-600">Start</span>
      </li>
    </ul>
  </div>
</body>
</html>
