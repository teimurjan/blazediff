<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plans</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-slate-50 to-slate-100 h-screen w-screen overflow-hidden flex items-center justify-center font-sans">
  <div class="w-full max-w-6xl px-8">
    <div class="flex items-end justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold text-slate-900">Choose your tier</h1>
        <p class="text-slate-500 mt-1">Switch or cancel whenever you want.</p>
      </div>
      <div class="inline-flex rounded-lg bg-slate-200 p-1 text-sm">
        <span class="rounded-md bg-white px-4 py-1.5 font-medium text-slate-800 shadow-sm">Monthly</span>
        <span class="px-4 py-1.5 font-medium text-slate-500">Yearly</span>
      </div>
    </div>
    <div class="grid grid-cols-4 gap-5">
      <div class="rounded-xl bg-white border border-slate-200 p-6">
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-400">Free</p>
        <p class="mt-3 text-3xl font-bold text-slate-900">$0</p>
        <p class="text-sm text-slate-500 mt-1">Forever free</p>
        <div class="mt-5 h-px bg-slate-100"></div>
        <p class="mt-4 text-sm text-slate-600">3 projects</p>
      </div>
      <div class="rounded-xl bg-white border border-slate-200 p-6">
        <p class="text-xs font-semibold uppercase tracking-wide text-amber-500">Plus</p>
        <p class="mt-3 text-3xl font-bold text-slate-900">$15</p>
        <p class="text-sm text-slate-500 mt-1">per month</p>
        <div class="mt-5 h-px bg-slate-100"></div>
        <p class="mt-4 text-sm text-slate-600">25 projects</p>
      </div>
      <div class="rounded-xl bg-white border-2 border-amber-400 p-6 relative">
        <span data-changed="true" data-region-id="region-1" class="absolute top-4 right-4 bg-amber-100 text-amber-700 text-xs font-semibold px-2.5 py-1 rounded-full">Best value</span>
        <p class="text-xs font-semibold uppercase tracking-wide text-amber-500">Premium</p>
        <p class="mt-3 text-3xl font-bold text-slate-900">$39</p>
        <p class="text-sm text-slate-500 mt-1">per month</p>
        <div class="mt-5 h-px bg-slate-100"></div>
        <p class="mt-4 text-sm text-slate-600">Unlimited</p>
      </div>
      <div class="rounded-xl bg-slate-900 p-6">
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-400">Scale</p>
        <p class="mt-3 text-3xl font-bold text-white">Custom</p>
        <p class="text-sm text-slate-400 mt-1">Talk to us</p>
        <div class="mt-5 h-px bg-slate-700"></div>
        <p class="mt-4 text-sm text-slate-300">Everything</p>
      </div>
    </div>
  </div>
</body>
</html>
