<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-amber-100 to-orange-100 h-screen flex items-center justify-center font-sans">
  <div class="w-full max-w-4xl grid grid-cols-2 bg-white rounded-3xl shadow-2xl overflow-hidden">
    <div data-changed="true" data-region-id="region-1" class="bg-fuchsia-600 p-10 flex flex-col justify-center text-white">
      <h2 class="text-3xl font-extrabold leading-tight">Join 40,000+ teams shipping faster.</h2>
      <p class="mt-4 text-amber-50">Set up your workspace in under two minutes.</p>
      <ul class="mt-6 space-y-2 text-sm text-amber-50">
        <li>• Unlimited projects</li>
        <li>• Real-time collaboration</li>
        <li>• 24/7 priority support</li>
      </ul>
    </div>
    <div class="p-10">
      <h1 class="text-2xl font-bold text-gray-900 mb-6">Get started free</h1>
      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Workspace name</label>
          <input type="text" value="Acme Inc" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" value="you@acme.com" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" value="........" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
        </div>
        <button type="button" data-changed="true" data-region-id="region-2" class="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700">Create workspace</button>
      </form>
    </div>
  </div>
</body>
</html>
