<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=800">
<title>Discard changes</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="w-[1280px] h-[800px] overflow-hidden">
<div class="relative w-[1280px] h-[800px] bg-amber-50">
<div class="absolute inset-0 p-12">
<div class="text-2xl font-bold text-amber-900">Newsletter Editor</div>
<div class="mt-8 h-96 rounded-2xl bg-white shadow-sm border border-amber-100"></div>
</div>
<div class="absolute inset-0 bg-amber-950/50 flex items-center justify-center">
<div class="w-[440px] rounded-2xl bg-white shadow-2xl p-7 text-center">
<div class="mx-auto flex items-center justify-center w-14 h-14 rounded-full bg-amber-100">
<span data-changed="true" data-region-id="region-1" class="text-amber-600 text-3xl">&#9888;</span>
</div>
<h2 class="mt-5 text-xl font-semibold text-slate-900">Discard unsaved changes?</h2>
<p class="mt-2 text-sm leading-relaxed text-slate-500">You have edits to the &ldquo;March Highlights&rdquo; draft that haven&rsquo;t been saved. If you leave now, your changes will be lost.</p>
<div class="mt-6 flex gap-3">
<button class="flex-1 px-4 py-2.5 rounded-lg text-sm font-medium text-slate-700 bg-slate-100">Keep editing</button>
<button class="flex-1 px-4 py-2.5 rounded-lg text-sm font-semibold text-white bg-amber-600">Discard</button>
</div>
</div>
</div>
</div>
</body>
</html>
