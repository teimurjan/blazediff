<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans">
  <div class="w-full max-w-3xl bg-white rounded-2xl shadow-lg p-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-xl font-bold text-gray-900">Billing &amp; plan</h1>
      <span data-changed="true" data-region-id="region-1" class="text-xs font-semibold px-3 py-1 rounded-full bg-green-100 text-green-700">Active</span>
    </div>
    <div class="border border-gray-200 rounded-xl p-5 mb-6 flex items-center justify-between">
      <div>
        <p class="text-sm text-gray-500">Current plan</p>
        <p class="text-lg font-bold text-gray-900">Pro — $29.00 / month</p>
        <p class="text-xs text-gray-400 mt-1">Renews on June 12, 2026</p>
      </div>
      <button type="button" class="bg-white border border-gray-300 text-gray-700 text-sm font-medium px-4 py-2 rounded-lg">Change plan</button>
    </div>
    <h2 class="text-sm font-semibold text-gray-700 mb-3">Payment details</h2>
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Card on file</label>
        <input type="text" value="Visa ending 4242" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Billing email</label>
        <input type="email" value="billing@acme.com" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
      </div>
    </div>
    <div class="flex gap-3">
      <button type="button" class="bg-indigo-600 text-white text-sm font-semibold px-5 py-2.5 rounded-lg">Update billing</button>
      <button type="button" data-changed="true" data-region-id="region-2" class="bg-red-50 text-red-600 text-sm font-semibold px-5 py-2.5 rounded-lg">Cancel subscription</button>
    </div>
  </div>
</body>
</html>
