<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spend Monitor</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 h-screen overflow-hidden">
<div class="h-full p-6 flex flex-col gap-5">
  <h1 class="text-2xl font-bold text-stone-900">Cloud Spend Monitor</h1>
  <div class="grid grid-cols-4 gap-5">
    <div data-changed="true" data-region-id="region-1" class="rounded-xl p-5 shadow-sm bg-indigo-600 text-white">
      <p class="text-xs text-indigo-200">This month</p>
      <p class="text-3xl font-bold mt-1">$38,402</p>
      <p class="text-sm text-indigo-200 mt-1">+8.2% MoM</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-stone-400">Forecast</p>
      <p class="text-3xl font-bold text-stone-900 mt-1">$41,900</p>
      <p class="text-sm text-rose-600 mt-1">Over budget</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-stone-400">Savings plans</p>
      <p class="text-3xl font-bold text-stone-900 mt-1">$6,210</p>
      <p class="text-sm text-emerald-600 mt-1">14% covered</p>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <p class="text-xs text-stone-400">Untagged</p>
      <p class="text-3xl font-bold text-stone-900 mt-1">$2,114</p>
      <p class="text-sm text-amber-600 mt-1">Needs review</p>
    </div>
  </div>
  <div class="grid grid-cols-3 gap-5 flex-1">
    <div class="bg-white rounded-xl p-6 shadow-sm col-span-2 flex flex-col">
      <h2 class="text-sm font-semibold text-stone-700 mb-4">Daily spend</h2>
      <div class="flex items-end gap-1.5 flex-1">
        <div class="flex-1 bg-violet-500 rounded-t h-1/3"></div>
        <div class="flex-1 bg-violet-500 rounded-t h-2/5"></div>
        <div class="flex-1 bg-violet-500 rounded-t h-1/2"></div>
        <div class="flex-1 bg-violet-500 rounded-t h-3/5"></div>
        <div class="flex-1 bg-violet-500 rounded-t h-2/5"></div>
        <div class="flex-1 bg-violet-500 rounded-t h-3/4"></div>
        <div class="flex-1 bg-violet-500 rounded-t h-2/3"></div>
        <div class="flex-1 bg-violet-500 rounded-t h-4/5"></div>
        <div class="flex-1 bg-violet-500 rounded-t h-1/2"></div>
        <div class="flex-1 bg-violet-500 rounded-t h-full"></div>
        <div class="flex-1 bg-violet-500 rounded-t h-3/5"></div>
        <div class="flex-1 bg-violet-500 rounded-t h-2/3"></div>
      </div>
    </div>
    <div class="bg-white rounded-xl p-6 shadow-sm flex flex-col">
      <h2 class="text-sm font-semibold text-stone-700 mb-4">By service</h2>
      <div class="space-y-3 flex-1">
        <div>
          <div class="flex justify-between text-xs text-stone-500 mb-1"><span>Compute</span><span>52%</span></div>
          <div class="h-2.5 bg-stone-100 rounded-full"><div class="h-2.5 bg-blue-500 rounded-full w-1/2"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-stone-500 mb-1"><span>Storage</span><span>23%</span></div>
          <div class="h-2.5 bg-stone-100 rounded-full"><div class="h-2.5 bg-blue-500 rounded-full w-1/4"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-stone-500 mb-1"><span>Network</span><span>14%</span></div>
          <div class="h-2.5 bg-stone-100 rounded-full"><div class="h-2.5 bg-blue-500 rounded-full w-1/6"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs text-stone-500 mb-1"><span>Other</span><span>11%</span></div>
          <div class="h-2.5 bg-stone-100 rounded-full"><div class="h-2.5 bg-blue-500 rounded-full w-1/12"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
