<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center font-sans">
  <div class="w-full max-w-md bg-slate-800 rounded-2xl border border-slate-700 p-8 text-center">
    <div data-changed="true" data-region-id="region-1" class="mx-auto w-20 h-20 rounded-full bg-fuchsia-500 flex items-center justify-center mb-6">
      <div class="w-9 h-7 rounded bg-white"></div>
    </div>
    <h1 class="text-xl font-bold text-white">Check your inbox</h1>
    <p class="text-sm text-slate-400 mt-2 leading-relaxed">We sent a verification link to <span class="text-slate-200 font-medium">ava@company.com</span>. Click it to activate your account.</p>
    <button type="button" class="mt-6 w-full bg-blue-500 text-white text-sm font-semibold py-3 rounded-xl hover:bg-blue-600">Open email app</button>
    <div class="mt-5 flex items-center gap-3">
      <div class="flex-1 h-px bg-slate-700"></div>
      <span class="text-xs text-slate-500">Didn't get it?</span>
      <div class="flex-1 h-px bg-slate-700"></div>
    </div>
    <button type="button" data-changed="true" data-region-id="region-2" class="mt-4 text-sm font-semibold text-amber-400">Resend verification email</button>
    <p class="mt-4 text-xs text-slate-500">Wrong address? <span class="text-slate-300">Change email</span></p>
  </div>
</body>
</html>
