<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=800">
<title>Share document</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="w-[1280px] h-[800px] overflow-hidden">
<div class="relative w-[1280px] h-[800px] bg-zinc-100">
<div class="absolute inset-0 p-10">
<div class="flex items-center justify-between">
<div class="text-xl font-bold text-zinc-800">Q2 Roadmap.doc</div>
<div class="text-sm text-zinc-400">Edited 3 minutes ago</div>
</div>
<div class="mt-8 space-y-3">
<div class="h-4 w-2/3 rounded bg-zinc-300"></div>
<div class="h-4 w-1/2 rounded bg-zinc-200"></div>
<div class="h-4 w-3/4 rounded bg-zinc-200"></div>
</div>
</div>
<div class="absolute inset-0 bg-zinc-900/55 flex items-center justify-center">
<div class="w-[520px] rounded-2xl bg-white shadow-2xl">
<div class="px-6 py-5 border-b border-zinc-100 flex items-center justify-between">
<h2 class="text-lg font-semibold text-zinc-900">Share &ldquo;Q2 Roadmap&rdquo;</h2>
<span class="text-zinc-400 text-xl">&times;</span>
</div>
<div class="px-6 py-5">
<div class="flex gap-2">
<input type="text" value="teammate@company.com" class="flex-1 px-3 py-2 rounded-lg text-sm text-zinc-700 bg-zinc-50 border border-zinc-200" readonly>
<button data-changed="true" data-region-id="region-1" class="px-4 py-2 rounded-lg text-sm font-semibold text-white bg-blue-600">Invite</button>
</div>
<div class="mt-5 space-y-3">
<div class="flex items-center justify-between">
<div class="text-sm text-zinc-700">Alex Rivera (you)</div>
<div class="text-xs text-zinc-400">Owner</div>
</div>
<div class="flex items-center justify-between">
<div class="text-sm text-zinc-700">Priya Nair</div>
<div class="text-xs text-zinc-400">Can edit</div>
</div>
</div>
</div>
<div class="px-6 py-4 bg-zinc-50 rounded-b-2xl flex items-center justify-between">
<span class="text-sm text-zinc-500">Anyone with the link can view</span>
<button class="px-4 py-2 rounded-lg text-sm font-medium text-zinc-700 bg-white border border-zinc-300">Copy link</button>
</div>
</div>
</div>
</div>
</body>
</html>
