<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=800">
<title>Order Detail</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 w-[1280px] h-[800px] overflow-hidden font-sans">
<div class="max-w-5xl mx-auto pt-10 px-6">
<h1 class="text-2xl font-bold text-slate-900">Invoice INV-7741</h1>
<p class="text-slate-500 text-sm mt-1">Issued March 14, 2026 · Due March 28, 2026</p>
<div class="grid grid-cols-3 gap-6 mt-8">
<div data-changed="true" data-region-id="region-1" class="rounded-xl bg-blue-600 text-white p-6">
<div class="text-sm text-blue-100">Amount Due</div>
<div class="text-3xl font-bold mt-2">$1,840.00</div>
</div>
<div class="rounded-xl bg-white border border-slate-200 p-6">
<div class="text-sm text-slate-500">Billed To</div>
<div class="font-semibold text-slate-900 mt-2">Northwind Labs</div>
<div class="text-sm text-slate-500">accounts@northwind.io</div>
</div>
<div class="rounded-xl bg-white border border-slate-200 p-6">
<div class="text-sm text-slate-500">Payment</div>
<div class="font-semibold text-slate-900 mt-2">Wire Transfer</div>
<div class="text-sm text-slate-500">Net 14</div>
</div>
</div>
<div class="bg-white rounded-xl border border-slate-200 mt-6 overflow-hidden">
<div class="grid grid-cols-12 bg-slate-100 px-6 py-3 text-xs font-semibold text-slate-500 uppercase">
<div class="col-span-6">Description</div><div class="col-span-2 text-right">Qty</div><div class="col-span-2 text-right">Rate</div><div class="col-span-2 text-right">Total</div>
</div>
<div class="grid grid-cols-12 px-6 py-4 border-t border-slate-100 text-sm"><div class="col-span-6 text-slate-800">UX Audit & Report</div><div class="col-span-2 text-right">1</div><div class="col-span-2 text-right">$900</div><div class="col-span-2 text-right font-medium">$900</div></div>
<div class="grid grid-cols-12 px-6 py-4 border-t border-slate-100 text-sm"><div class="col-span-6 text-slate-800">Prototype Build</div><div class="col-span-2 text-right">8</div><div class="col-span-2 text-right">$110</div><div class="col-span-2 text-right font-medium">$880</div></div>
</div>
<div class="flex justify-end mt-6">
<button data-changed="true" data-region-id="region-2" class="px-8 py-3 rounded-lg bg-blue-600 text-white font-semibold">Pay Invoice</button>
</div>
</div>
</body>
</html>
