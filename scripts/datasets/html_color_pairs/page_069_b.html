<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=800">
<title>Storage almost full</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="w-[1280px] h-[800px] overflow-hidden">
<div class="relative w-[1280px] h-[800px] bg-slate-200">
<div class="absolute inset-0 p-12">
<div class="text-xl font-bold text-slate-700">My Drive</div>
<div class="mt-8 grid grid-cols-5 gap-5">
<div class="h-28 rounded-xl bg-white shadow-sm"></div>
<div class="h-28 rounded-xl bg-white shadow-sm"></div>
<div class="h-28 rounded-xl bg-white shadow-sm"></div>
<div class="h-28 rounded-xl bg-white shadow-sm"></div>
<div class="h-28 rounded-xl bg-white shadow-sm"></div>
</div>
</div>
<div class="absolute inset-0 bg-slate-900/60 flex items-center justify-center">
<div class="w-[460px] rounded-2xl bg-white shadow-2xl overflow-hidden">
<div data-changed="true" data-region-id="region-1" class="h-2 w-full bg-rose-500"></div>
<div class="px-7 py-6">
<h2 class="text-xl font-semibold text-slate-900">Storage almost full</h2>
<p class="mt-2 text-sm leading-relaxed text-slate-500">You&rsquo;ve used 14.6 GB of your 15 GB. Once you run out of space, you won&rsquo;t be able to upload new files or receive shared documents.</p>
<div class="mt-5">
<div class="h-3 w-full rounded-full bg-slate-100 overflow-hidden">
<div class="h-3 w-[97%] rounded-full bg-orange-500"></div>
</div>
<div class="mt-2 text-xs text-slate-400">14.6 GB of 15 GB used</div>
</div>
</div>
<div class="px-7 py-4 bg-slate-50 flex justify-end gap-3">
<button class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 bg-white border border-slate-300">Not now</button>
<button data-changed="true" data-region-id="region-2" class="px-4 py-2 rounded-lg text-sm font-semibold text-white bg-violet-600">Upgrade storage</button>
</div>
</div>
</div>
</div>
</body>
</html>
