<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 h-screen w-screen overflow-hidden relative font-sans">
  <div class="absolute inset-0 p-10">
    <div class="flex items-center gap-3 mb-6">
      <div class="h-3 w-3 rounded-full bg-rose-400"></div>
      <div class="h-3 w-3 rounded-full bg-amber-400"></div>
      <div class="h-3 w-3 rounded-full bg-emerald-400"></div>
      <span class="text-zinc-400 text-sm ml-3">main.rs — blazediff</span>
    </div>
    <div class="space-y-2 max-w-3xl">
      <div class="h-3 w-2/3 rounded bg-zinc-700"></div>
      <div class="h-3 w-1/2 rounded bg-zinc-700"></div>
      <div class="h-3 w-3/4 rounded bg-zinc-700"></div>
      <div class="h-3 w-1/3 rounded bg-zinc-700"></div>
      <div class="h-3 w-2/5 rounded bg-zinc-700"></div>
    </div>
  </div>
  <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-3">
    <div data-changed="true" data-region-id="region-1" class="rounded-lg bg-emerald-600 text-white shadow-xl px-4 py-3 flex items-center gap-2">
      <span class="font-bold">&check;</span>
      <p class="text-sm font-medium">Saved — all changes synced to cloud</p>
    </div>
    <div class="rounded-lg bg-zinc-700 text-zinc-100 shadow-xl px-4 py-3 flex items-center gap-2">
      <span class="font-bold">i</span>
      <p class="text-sm font-medium">Formatting applied on save</p>
    </div>
    <div data-changed="true" data-region-id="region-2" class="rounded-lg bg-amber-500 text-white shadow-xl px-4 py-3 flex items-center gap-2">
      <span class="font-bold">!</span>
      <p class="text-sm font-medium">4 lint warnings remaining</p>
    </div>
  </div>
</body>
</html>
