<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Settings</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center font-sans">
  <div class="w-full max-w-3xl bg-white rounded-xl shadow-md border border-gray-200 grid grid-cols-3">
    <aside class="col-span-1 border-r border-gray-200 p-6 bg-gray-50 rounded-l-xl">
      <h2 class="text-lg font-bold text-gray-900 mb-5">Settings</h2>
      <nav class="space-y-1 text-sm">
        <div data-changed="true" data-region-id="region-1" class="px-3 py-2 rounded-md bg-violet-100 text-violet-700 font-medium">Profile</div>
        <div class="px-3 py-2 rounded-md text-gray-600">Notifications</div>
        <div class="px-3 py-2 rounded-md text-gray-600">Security</div>
        <div class="px-3 py-2 rounded-md text-gray-600">Billing</div>
        <div class="px-3 py-2 rounded-md text-gray-600">Integrations</div>
      </nav>
    </aside>
    <section class="col-span-2 p-8">
      <h3 class="text-xl font-semibold text-gray-900 mb-1">Profile</h3>
      <p class="text-sm text-gray-500 mb-6">Update your personal details and contact info.</p>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Display name</label>
          <input type="text" value="Marcus Lee" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Bio</label>
          <textarea rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">Product designer in Berlin.</textarea>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" class="bg-gray-900 text-white text-sm font-medium px-5 py-2 rounded-lg">Save changes</button>
          <button type="button" class="bg-white border border-gray-300 text-gray-700 text-sm font-medium px-5 py-2 rounded-lg">Cancel</button>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
