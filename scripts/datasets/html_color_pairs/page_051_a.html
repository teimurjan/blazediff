<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoices</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans">
  <header class="h-14 bg-white border-b border-slate-200 flex items-center px-6">
    <span class="text-lg font-bold text-slate-900">Acme Billing</span>
    <nav class="ml-8 flex gap-6 text-sm text-slate-500">
      <span>Overview</span>
      <span class="text-slate-900 font-medium">Invoices</span>
      <span>Customers</span>
      <span>Settings</span>
    </nav>
    <div class="ml-auto w-9 h-9 rounded-full bg-slate-300"></div>
  </header>
  <main class="flex-1 flex items-center justify-center">
    <div class="text-center max-w-md">
      <div class="mx-auto w-40 h-40 rounded-3xl bg-slate-100 flex items-center justify-center mb-6">
        <div class="w-20 h-24 rounded-lg bg-white border-2 border-slate-200 flex flex-col gap-2 p-3">
          <div class="h-2 rounded bg-slate-200"></div>
          <div class="h-2 w-3/4 rounded bg-slate-200"></div>
          <div class="h-2 w-1/2 rounded bg-slate-200"></div>
          <div class="mt-auto h-4 rounded bg-indigo-200"></div>
        </div>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">No invoices yet</h1>
      <p class="text-sm text-slate-500 mt-2 leading-relaxed">When you bill a customer, your invoices will show up here. Create your first one to get started.</p>
      <button type="button" data-changed="true" data-region-id="region-1" class="mt-6 inline-flex items-center bg-indigo-600 text-white text-sm font-semibold px-5 py-2.5 rounded-lg hover:bg-indigo-700">Create invoice</button>
      <p class="mt-3 text-xs text-slate-400">or import invoices from a CSV file</p>
    </div>
  </main>
</body>
</html>
