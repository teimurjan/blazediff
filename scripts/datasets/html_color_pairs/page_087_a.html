<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Pipeline</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen w-screen overflow-hidden font-sans">
  <div class="h-full w-full p-8 flex flex-col">
    <h1 class="text-2xl font-bold text-slate-900 mb-6">Content Pipeline</h1>
    <div class="grid grid-cols-3 gap-6 flex-1 min-h-0">
      <div class="bg-slate-50 rounded-xl border border-slate-200 p-4 flex flex-col">
        <h2 class="text-sm font-semibold text-slate-700 mb-4">Drafting</h2>
        <div class="space-y-3 overflow-hidden">
          <div class="bg-white rounded-lg shadow-sm p-4 border border-slate-100">
            <p class="text-sm font-semibold text-slate-800">The future of edge computing</p>
            <div class="flex gap-2 mt-3">
              <span data-changed="true" data-region-id="region-1" class="text-xs font-medium px-2 py-0.5 rounded bg-blue-100 text-blue-700">Blog</span>
              <span class="text-xs font-medium px-2 py-0.5 rounded bg-slate-100 text-slate-600">Tech</span>
            </div>
          </div>
          <div class="bg-white rounded-lg shadow-sm p-4 border border-slate-100">
            <p class="text-sm font-semibold text-slate-800">Q1 product recap</p>
            <div class="flex gap-2 mt-3">
              <span class="text-xs font-medium px-2 py-0.5 rounded bg-purple-100 text-purple-700">Newsletter</span>
            </div>
          </div>
        </div>
      </div>
      <div class="bg-slate-50 rounded-xl border border-slate-200 p-4 flex flex-col">
        <h2 class="text-sm font-semibold text-slate-700 mb-4">In Review</h2>
        <div class="space-y-3 overflow-hidden">
          <div class="bg-white rounded-lg shadow-sm p-4 border border-slate-100">
            <p class="text-sm font-semibold text-slate-800">Customer story: Northwind</p>
            <div class="flex gap-2 mt-3">
              <span class="text-xs font-medium px-2 py-0.5 rounded bg-emerald-100 text-emerald-700">Case Study</span>
            </div>
          </div>
          <div class="bg-white rounded-lg shadow-sm p-4 border border-slate-100">
            <p class="text-sm font-semibold text-slate-800">Onboarding video script</p>
            <div class="flex gap-2 mt-3">
              <span class="text-xs font-medium px-2 py-0.5 rounded bg-rose-100 text-rose-700">Video</span>
            </div>
          </div>
        </div>
      </div>
      <div class="bg-slate-50 rounded-xl border border-slate-200 p-4 flex flex-col">
        <h2 class="text-sm font-semibold text-slate-700 mb-4">Published</h2>
        <div class="space-y-3 overflow-hidden">
          <div class="bg-white rounded-lg shadow-sm p-4 border border-slate-100">
            <p class="text-sm font-semibold text-slate-800">10 tips for faster CI</p>
            <div class="flex gap-2 mt-3">
              <span data-changed="true" data-region-id="region-2" class="text-xs font-medium px-2 py-0.5 rounded bg-amber-100 text-amber-700">Blog</span>
              <span class="text-xs font-medium px-2 py-0.5 rounded bg-slate-100 text-slate-600">DevOps</span>
            </div>
          </div>
          <div class="bg-white rounded-lg shadow-sm p-4 border border-slate-100">
            <p class="text-sm font-semibold text-slate-800">Spring release notes</p>
            <div class="flex gap-2 mt-3">
              <span class="text-xs font-medium px-2 py-0.5 rounded bg-purple-100 text-purple-700">Newsletter</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
