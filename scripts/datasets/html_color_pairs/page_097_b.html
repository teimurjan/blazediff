<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-200 h-screen w-screen overflow-hidden relative font-sans">
  <div class="absolute inset-0 p-10">
    <h1 class="text-xl font-semibold text-slate-700">Team inbox</h1>
    <div class="mt-6 space-y-3 max-w-2xl">
      <div class="h-14 rounded-lg bg-white/70"></div>
      <div class="h-14 rounded-lg bg-white/70"></div>
      <div class="h-14 rounded-lg bg-white/70"></div>
      <div class="h-14 rounded-lg bg-white/70"></div>
    </div>
  </div>
  <div class="absolute top-6 right-6 w-80 space-y-3">
    <div data-changed="true" data-region-id="region-1" class="rounded-xl bg-teal-50 border border-teal-200 p-4 flex gap-3">
      <div class="h-8 w-8 flex-none rounded-full bg-teal-500 text-white flex items-center justify-center font-bold">&check;</div>
      <div class="flex-1">
        <p class="text-sm font-semibold text-teal-800">Message sent</p>
        <p class="text-xs text-teal-600 mt-0.5">Your reply to Acme Corp was delivered.</p>
      </div>
    </div>
    <div class="rounded-xl bg-sky-50 border border-sky-200 p-4 flex gap-3">
      <div class="h-8 w-8 flex-none rounded-full bg-sky-500 text-white flex items-center justify-center font-bold">i</div>
      <div class="flex-1">
        <p class="text-sm font-semibold text-sky-800">3 new mentions</p>
        <p class="text-xs text-sky-600 mt-0.5">You were tagged in the #design channel.</p>
      </div>
    </div>
    <div data-changed="true" data-region-id="region-2" class="rounded-xl bg-rose-50 border border-rose-200 p-4 flex gap-3">
      <div class="h-8 w-8 flex-none rounded-full bg-rose-500 text-white flex items-center justify-center font-bold">!</div>
      <div class="flex-1">
        <p class="text-sm font-semibold text-rose-800">Draft not saved</p>
        <p class="text-xs text-rose-600 mt-0.5">Reconnect to save your unsent message.</p>
      </div>
    </div>
  </div>
</body>
</html>
